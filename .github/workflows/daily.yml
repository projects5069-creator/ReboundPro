name: ReboundPro Daily Collector

# US market closes 16:00 ET = 20:00 UTC (EDT, summer) / 21:00 UTC (EST, winter).
# 22:30 UTC gives a 1.5–2.5h buffer for yfinance EOD daily bars to settle,
# year-round, without needing to change the cron across DST.
# Mon–Fri (UTC) ≈ US trading week; US holidays are handled by the scanner's
# exchange-calendar last_trading_day() + scan_date upsert (re-run safe).
on:
  schedule:
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}        # allow manual runs for testing

concurrency:
  group: reboundpro-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install finvizfinance yfinance gspread google-auth pandas numpy pytz exchange_calendars requests

      - name: Restore service-account credentials from secret
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > google_credentials.json

      - name: Scanner — find today's qualifying drops
        env:
          REBOUND_SHEET_ID: ${{ secrets.REBOUND_SHEET_ID }}
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: python scanner.py

      - name: Gradual scanner — stocks down >=10% over 5 trading days (separate hypothesis)
        env:
          REBOUND_SHEET_ID: ${{ secrets.REBOUND_SHEET_ID }}
        run: python gradual_scanner.py   # runs AFTER scanner so same-day intraday_drop dedups; BEFORE catalyst/post so news+forward pick gradual rows

      - name: Catalyst — capture point-in-time news per candidate (Finnhub)
        env:
          REBOUND_SHEET_ID: ${{ secrets.REBOUND_SHEET_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python catalyst.py        # no-op if FINNHUB_API_KEY secret is unset

      - name: Post-analysis — update D1..D+N outcomes (upsert)
        env:
          REBOUND_SHEET_ID: ${{ secrets.REBOUND_SHEET_ID }}
        run: python post_analysis_collector.py

      - name: Remove credentials
        if: always()
        run: rm -f google_credentials.json

      # Dead-man heartbeat (healthchecks.io). Pings hc-ping.com so an external
      # watcher alerts when this collector STOPS running (cron-job.org pinger dead /
      # workflow disabled / GitHub cron skipped) — a "run never happened" that emits
      # no GitHub failure email. GUARDED: skips silently if HC_URL is unset, so this
      # is safe to commit before the healthchecks.io check + secret exist.
      - name: Heartbeat (healthchecks.io dead-man)
        if: always()
        env:
          HC_URL: ${{ secrets.HC_PING_DAILY }}
        run: |
          if [ -z "$HC_URL" ]; then echo "HC_PING_DAILY unset — skipping heartbeat."; exit 0; fi
          if [ "${{ job.status }}" = "success" ]; then
            curl -fsS -m 10 --retry 3 "$HC_URL"      && echo "heartbeat OK"
          else
            curl -fsS -m 10 --retry 3 "$HC_URL/fail" && echo "heartbeat /fail sent"
          fi
