name: ReboundPro Health Monitor

# Operational pipeline-health checks (health_monitor.py). READ-ONLY against the
# Sheet except the single health_log control tab. 3 runs per trading day (UTC):
#   13:00 UTC  pre-open    (09:00 EDT / 08:00 EST, ~½h before open)  --morning
#   17:30 UTC  mid-session (13:30 EDT / 12:30 EST)                   --morning
#   01:00 UTC  post-close  (21:00 EDT / 20:00 EST of the PREVIOUS    --evening
#              ET day, ~5h after close — EOD definitely done, no false "missing")
#
# DOW note (critical): 01:00 UTC of day X is 21:00 ET of day X-1, so the evening
# run uses "2-6" (Tue–Sat UTC) to cover Mon–Fri TRADING. Using "1-5" would miss
# Friday's evening (it falls on Sat UTC) and waste Monday's (it falls on Sun ET).
# The cron is fixed UTC year-round; NY shifts 1h between EDT/EST so the market-
# relative time drifts 1h twice a year — not critical for a health check.
# Exit policy: only exit=2 (failure) fails the run (→ GitHub alert email); exit=1
# (warning) is logged but the run stays green, so legacy warnings don't email 3x/day.
on:
  schedule:
    - cron: "0 13 * * 1-5"     # pre-open    --morning
    - cron: "30 17 * * 1-5"    # mid-session --morning
    - cron: "0 1 * * 2-6"      # post-close (prev ET day) --evening
  workflow_dispatch:
    inputs:
      mode:
        description: "monitor mode (manual runs)"
        type: choice
        options: [morning, evening]
        default: morning

concurrency:
  group: reboundpro-health
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install finvizfinance yfinance gspread google-auth pandas numpy pytz exchange_calendars requests

      - name: Restore service-account credentials from secret
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > google_credentials.json

      - name: Select mode by schedule
        id: mode
        run: |
          case "${{ github.event.schedule }}" in
            "0 1 * * 2-6") flag="--evening" ;;
            "0 13 * * 1-5"|"30 17 * * 1-5") flag="--morning" ;;
            *) flag="--${{ github.event.inputs.mode || 'morning' }}" ;;   # workflow_dispatch
          esac
          echo "flag=$flag" >> "$GITHUB_OUTPUT"
          echo "Selected health-monitor mode: $flag"

      - name: Run health monitor
        env:
          REBOUND_SHEET_ID: ${{ secrets.REBOUND_SHEET_ID }}
        run: |
          set +e
          python health_monitor.py ${{ steps.mode.outputs.flag }} | tee /tmp/health.txt
          code=${PIPESTATUS[0]}
          set -e
          {
            echo "### 🩺 Health monitor \`${{ steps.mode.outputs.flag }}\` — exit=$code"
            echo ""
            echo '```'
            cat /tmp/health.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$code" -eq 2 ]; then
            echo "exit=2 (failure) → failing the run to trigger an alert."
            exit 1
          fi
          echo "exit=$code (<=1) → run stays green (warnings are logged, not alerted)."
          exit 0

      - name: Remove credentials
        if: always()
        run: rm -f google_credentials.json
